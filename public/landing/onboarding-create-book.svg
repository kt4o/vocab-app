  <text x="30" y="748" fill="#68768a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" letter-spacing="2">RECENT BOOKS</text>
  <text x="30" y="798" fill="#68768a" font-family="Inter, Arial, sans-serif" font-size="22">No books yet</text>
